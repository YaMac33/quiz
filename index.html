<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>一問一答</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 16px;
    }
    input, button {
      font-size: 16px;
      padding: 8px;
      margin-top: 10px;
      width: 100%;
    }
    #result {
      margin-top: 16px;
      font-weight: bold;
    }
    #explanation {
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

  <h2 id="question">読み込み中...</h2>

  <input type="text" id="answerInput" placeholder="回答を入力">
  <button onclick="checkAnswer()">回答</button>

  <div id="result"></div>
  <div id="explanation"></div>

  <script>
    let data = [];
    let current = null;
    let lastQuestionId = null;

    // localStorage
    let wrong = JSON.parse(localStorage.getItem("wrong") || "[]");
    let correctStreak = JSON.parse(localStorage.getItem("correctStreak") || "{}");

    fetch("data.json")
      .then(res => res.json())
      .then(json => {
        data = json;
        nextQuestion();
      });

    function nextQuestion() {
      let pool;

      if (wrong.length > 0 && Math.random() < 0.7) {
        // wrong優先
        pool = data.filter(q => wrong.includes(q.id));
      } else {
        // 全体
        pool = data;
      }

      // 直前問題を除外
      if (pool.length > 1) {
        pool = pool.filter(q => q.id !== lastQuestionId);
      }

      current = pool[Math.floor(Math.random() * pool.length)];
      lastQuestionId = current.id;

      document.getElementById("question").textContent = current.question;
      document.getElementById("answerInput").value = "";
      document.getElementById("result").textContent = "";
      document.getElementById("explanation").textContent = "";
    }

    function checkAnswer() {
      const input = document.getElementById("answerInput").value.trim();
      const correctAnswers = current.answer;

      const isCorrect = correctAnswers.includes(input);

      if (isCorrect) {
        document.getElementById("result").textContent = "⭕ 正解";

        correctStreak[current.id] = (correctStreak[current.id] || 0) + 1;

        if (correctStreak[current.id] >= 2) {
          // wrongから削除
          wrong = wrong.filter(id => id !== current.id);
        }

      } else {
        document.getElementById("result").textContent = "❌ 不正解";

        correctStreak[current.id] = 0;

        if (!wrong.includes(current.id)) {
          wrong.push(current.id);
        }
      }

      document.getElementById("explanation").textContent = current.explanation;

      // 保存
      localStorage.setItem("wrong", JSON.stringify(wrong));
      localStorage.setItem("correctStreak", JSON.stringify(correctStreak));

      // ワンテンポ遅らせて次へ
      setTimeout(nextQuestion, 800);
    }
  </script>

</body>
</html>
