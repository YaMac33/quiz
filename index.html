<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>一問一答</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    #result {
      margin-top: 10px;
      font-weight: bold;
    }
    #explanation {
      margin-top: 10px;
      color: gray;
    }
    button {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2 id="question">読み込み中...</h2>

  <input type="text" id="answerInput" placeholder="答えを入力">
  <br>
  <button onclick="submitAnswer()">回答</button>

  <div id="result"></div>
  <div id="explanation"></div>
  <button onclick="nextQuestion()">次へ</button>

<script>
let data = [];
let current = null;
let state = JSON.parse(localStorage.getItem("state") || "{}");

async function loadData() {
  const res = await fetch("data.json");
  data = await res.json();
  nextQuestion();
}

function pickQuestion() {
  // wrong優先
  const wrong = data.filter(q => state[q.id]?.status === "wrong");
  const pool = wrong.length ? wrong : data;
  return pool[Math.floor(Math.random() * pool.length)];
}

function nextQuestion() {
  current = pickQuestion();
  document.getElementById("question").textContent = current.question;
  document.getElementById("answerInput").value = "";
  document.getElementById("result").textContent = "";
  document.getElementById("explanation").textContent = "";
}

function submitAnswer() {
  const input = document.getElementById("answerInput").value.trim();

  setTimeout(() => { // ワンテンポ遅延
    const correct = current.answer.includes(input);

    if (!state[current.id]) {
      state[current.id] = { status: "new", streak: 0 };
    }

    if (correct) {
      state[current.id].streak += 1;

      if (state[current.id].streak >= 2) {
        state[current.id].status = "correct";
      }

      document.getElementById("result").textContent = "⭕ 正解";
    } else {
      state[current.id].status = "wrong";
      state[current.id].streak = 0;

      document.getElementById("result").textContent =
        "❌ 不正解（正解: " + current.answer[0] + "）";
    }

    document.getElementById("explanation").textContent =
      current.explanation;

    localStorage.setItem("state", JSON.stringify(state));

  }, 300);
}

loadData();
</script>

</body>
</html>
